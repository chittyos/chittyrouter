name = "chittyrouter"
main = "src/index-minimal.js"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "0bc21e3a5a9de1a4cc843be9c3e98121"

# AI Binding
[ai]
binding = "AI"

# Durable Objects (local to this worker)
[[durable_objects.bindings]]
name = "AI_STATE_DO"
class_name = "AIStateDO"

[[durable_objects.bindings]]
name = "SYNC_STATE"
class_name = "SyncStateDurableObject"

# Agents SDK Durable Objects
[[durable_objects.bindings]]
name = "TRIAGE_AGENT"
class_name = "TriageAgent"

[[durable_objects.bindings]]
name = "PRIORITY_AGENT"
class_name = "PriorityAgent"

[[durable_objects.bindings]]
name = "RESPONSE_AGENT"
class_name = "ResponseAgent"

[[durable_objects.bindings]]
name = "DOCUMENT_AGENT"
class_name = "DocumentAgent"

[[durable_objects.bindings]]
name = "ENTITY_AGENT"
class_name = "EntityAgent"

[[durable_objects.bindings]]
name = "EVIDENCE_AGENT"
class_name = "EvidenceAgent"

[[durable_objects.bindings]]
name = "CALENDAR_AGENT"
class_name = "CalendarAgent"

[[durable_objects.bindings]]
name = "FINANCE_AGENT"
class_name = "FinanceAgent"

[[durable_objects.bindings]]
name = "NOTIFICATION_AGENT"
class_name = "NotificationAgent"

[[durable_objects.bindings]]
name = "INTELLIGENCE_AGENT"
class_name = "IntelligenceAgent"

[[durable_objects.bindings]]
name = "WEBHOOK_AGENT"
class_name = "WebhookIngestionAgent"

[[durable_objects.bindings]]
name = "MESSAGING_AGENT"
class_name = "MessagingAgent"

# DO Migrations
[[migrations]]
tag = "v1"
new_classes = ["AIStateDO", "SyncStateDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["TriageAgent", "PriorityAgent", "ResponseAgent", "DocumentAgent", "EntityAgent", "EvidenceAgent", "CalendarAgent", "FinanceAgent", "NotificationAgent", "IntelligenceAgent", "WebhookIngestionAgent", "MessagingAgent"]

# Environment Variables
[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "ChittyRouter AI Gateway"
VERSION = "2.1.0-ai"
AI_MODEL_PRIMARY = "@cf/meta/llama-4-scout-17b-16e-instruct"
AI_MODEL_SECONDARY = "@cf/openai/gpt-oss-120b"
AI_MODEL_VISION = "@cf/meta/llama-3.2-11b-vision-instruct"
AI_MODEL_AUDIO = "@cf/openai/whisper"
AI_MODEL_REASONING = "@cf/google/gemma-3-12b-it"
LOG_LEVEL = "INFO"
PROJECT_ID = "chittyrouter"
CHITTY_ORG = "ChittyOS"
SESSION_REPO = "chittychat-sessions"
RANDOMNESS_BEACON = "true"
VERSION_MANAGEMENT = "enterprise"
# Third-party tokens managed by ChittyConnect - no direct token storage
CHITTYCONNECT_URL = "https://connect.chitty.cc"

# Routes
[[routes]]
pattern = "router.chitty.cc/*"
zone_name = "chitty.cc"

# mcp.chitty.cc is served by chittyconnect
# [[routes]]
# pattern = "mcp.chitty.cc/*"
# zone_name = "chitty.cc"

# [[routes]]
# pattern = "ai.chitty.cc/*"
# zone_name = "chitty.cc"

# Sync route (commented out until DNS configured)
# [[routes]]
# pattern = "sync.chitty.cc"
# custom_domain = true

# Email Worker Configuration - Handles chitty.cc email routing
[[email]]
name = "chittyrouter-email"
destination_addresses = [
  "*@chitty.cc",
  "*-v-*@chitty.cc",
  "case-*@chitty.cc",
  "matter-*@chitty.cc",
  "intake@chitty.cc",
  "legal@chitty.cc",
  "evidence@chitty.cc",
  "calendar@chitty.cc"
]

# Development Environment
[env.development]
[env.development.vars]
ENVIRONMENT = "development"
LOG_LEVEL = "DEBUG"
AI_DEBUG = "true"

# KV Bindings for caching
[[env.development.kv_namespaces]]
binding = "AI_CACHE"
id = "ai_cache_dev"
preview_id = "ai_cache_preview"

# Staging Environment
[env.staging]
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "INFO"
AI_DEBUG = "false"
SERVICE_NAME = "ChittyRouter AI Gateway"
VERSION = "2.1.0-ai"
