# Analytics Engine for AI metrics (disabled - needs to be enabled in dashboard)
# [[env.production.analytics_engine_datasets]]
# binding = "AI_ANALYTICS"

# R2 Storage for document attachments
[[env.production.r2_buckets]]
binding = "DOCUMENT_STORAGE"
bucket_name = "chittyrouter-documents"

# R2 Storage for webhook ingestion
[[env.production.r2_buckets]]
binding = "WEBHOOK_STORAGE"
bucket_name = "notion-webhook"

# ChittyTrack observability (must be in env.production to be inherited)
[[env.production.tail_consumers]]
service = "chittytrack"

# Secrets (set via wrangler secret put)
# CHITTYCHAIN_API_KEY - API key for ChittyChain blockchain
# EVIDENCE_VAULT_API_KEY - API key for Evidence Vault
# OPENAI_API_KEY - Optional OpenAI API key for fallback
# ENCRYPTION_KEY - Key for encrypting sensitive data
# NOTION_WEBHOOK_SECRET - HMAC secret for Notion webhook verification
# NOTION_TOKEN - Notion integration token for page fetching
# GITHUB_WEBHOOK_SECRET - HMAC secret for GitHub webhook verification
# STRIPE_WEBHOOK_SECRET - HMAC secret for Stripe webhook verification
# WEBHOOK_INDEX_URL - POST URL for Neon indexing service
# INGEST_SERVICE_TOKEN - Bearer token for index service

# Build configuration - let wrangler handle bundling
# [build]
# command = "npm run build"
# watch_dir = "src"

# Limits
[limits]
cpu_ms = 30000  # 30 seconds for AI processing

# Scheduled triggers - handled by scheduled() event handler
[triggers]
crons = [
  "0 */6 * * *",   # Cleanup AI cache
  "0 0 * * *",     # Daily metrics
  "*/30 * * * *",  # DLQ processing
  "0 */2 * * *",   # Session reconcile
  "*/15 * * * *"   # Inbox monitoring
]

# Let wrangler handle bundling - no custom build needed

# Placement for optimal AI performance
[placement]
mode = "smart"

# ChittyTrack observability
[[tail_consumers]]
service = "chittytrack"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
