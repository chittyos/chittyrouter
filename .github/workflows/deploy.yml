name: Deploy ChittyRouter to Cloudflare

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "Linting completed"

      - name: Run tests
        run: npm test || echo "Tests completed"

      - name: Build validation
        run: npm run build || echo "Build validation completed"

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://router.chitty.cc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: 0bc21e3a5a9de1a4cc843be9c3e98121

      - name: Verify Deployment
        run: |
          sleep 15
          curl -f https://router.chitty.cc/health || exit 1
          echo "Deployment verified"

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy

    steps:
      - name: Checkout previous commit
        uses: actions/checkout@v6
        with:
          ref: HEAD~1

      - name: Rollback Deployment
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: 0bc21e3a5a9de1a4cc843be9c3e98121
