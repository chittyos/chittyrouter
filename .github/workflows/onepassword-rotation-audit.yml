name: 1Password Rotation Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "25 3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Determine audit mode
        id: audit_mode
        shell: bash
        run: |
          set -euo pipefail
          has_catalog=false
          has_script=false
          [[ -f ".github/secret-catalog.json" ]] && has_catalog=true
          [[ -x "scripts/onepassword-rotation-audit.sh" ]] && has_script=true
          echo "has_catalog=${has_catalog}" >> "$GITHUB_OUTPUT"
          echo "has_script=${has_script}" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        if: ${{ steps.audit_mode.outputs.has_script == 'true' && steps.audit_mode.outputs.has_catalog == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          [[ -n "${GH_TOKEN:-}" ]] || { echo "Missing ORG_AUTOMATION_TOKEN"; exit 1; }
          [[ -n "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]] || { echo "Missing OP_SERVICE_ACCOUNT_TOKEN"; exit 1; }
      - name: Install 1Password CLI
        if: ${{ steps.audit_mode.outputs.has_script == 'true' && steps.audit_mode.outputs.has_catalog == 'true' }}
        uses: 1password/install-cli-action@9a0c9dd934086b7ab1d90115d455bda1c53c2bdb # v2.0.2
      - name: Run rotation audit
        id: rotation
        shell: bash
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p reports/secret-rotation
          report_dir="reports/secret-rotation"
          report_file="${report_dir}/latest.md"
          stt="pass"

          if [[ "${{ steps.audit_mode.outputs.has_catalog }}" == "true" && "${{ steps.audit_mode.outputs.has_script }}" == "true" ]]; then
            if ! bash scripts/onepassword-rotation-audit.sh .github/secret-catalog.json "${report_dir}"; then
              stt="fail"
            fi
          else
            {
              echo "# 1Password rotation audit"
              echo
              echo "_Automated report generated on $(date -u +"%Y-%m-%d %H:%M:%SZ")_"
              echo
              if [[ "${{ steps.audit_mode.outputs.has_catalog }}" != "true" ]]; then
                echo "No secret catalog file was found at \`.github/secret-catalog.json\`."
                echo
                echo "No rotation checks were performed."
              elif [[ "${{ steps.audit_mode.outputs.has_script }}" != "true" ]]; then
                echo "The audit helper script \`scripts/onepassword-rotation-audit.sh\` is not present in this repository."
                echo
                echo "No rotation checks were performed. Once the audit script is added, this workflow will execute real rotation checks."
              fi
            } > "${report_file}"
          fi

          echo "status=${stt}" >> "$GITHUB_OUTPUT"
      - name: Upload rotation report
        uses: actions/upload-artifact@v7
        with:
          name: onepassword-rotation-report
          path: reports/secret-rotation
      - name: Open or update rotation issue on failure
        if: ${{ always() && steps.rotation.outputs.status == 'fail' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          title="[Security] 1Password rotation policy violations"
          body_file="reports/secret-rotation/latest.md"
          if [[ -f "${body_file}" ]]; then
            body="$(cat "${body_file}")"
          else
            body="1Password rotation audit failed, but no report file was found at ${body_file}. Check the 'Run rotation audit' step logs for errors."
          fi
          existing="$(gh issue list --state open --search "\"${title}\" in:title" --json number,title --jq '.[] | select(.title=="'"${title}"'") | .number' | head -n1 || true)"
          if [[ -n "${existing}" ]]; then
            gh issue comment "${existing}" --body "${body}" >/dev/null
          else
            gh issue create --title "${title}" --body "${body}" >/dev/null
          fi
