name: compliance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    uses: CHITTYOS/chittyops/.github/workflows/reusable-compliance-check.yml@main
    with:
      service_name: 'chittyrouter'
      tier: 2
      check_health: true
      domain: 'router.chitty.cc'

  compliance:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - run: echo "Compliance gate passed"
